<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" fill="none">
  <!-- Outer border -->
  <rect x="2" y="2" width="236" height="216" stroke="currentColor" stroke-width="1.6" fill="none"/>
  <!-- Inner border -->
  <rect x="7" y="7" width="226" height="206" stroke="currentColor" stroke-width="0.5" fill="none"/>

  <!-- Decorative top swash -->
  <path d="M120 22 C108 22 98 28 92 36" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M120 22 C132 22 142 28 148 36" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="120" cy="21" r="1.5" fill="currentColor"/>

  <!-- L letter -->
  <line x1="78" y1="38" x2="78" y2="106" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="78" y1="106" x2="108" y2="106" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- L top serif -->
  <line x1="73" y1="38" x2="83" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>

  <!-- Decorative swash from L top -->
  <path d="M78 38 C78 30 90 22 104 24 C114 25 120 30 120 38" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- N letter -->
  <line x1="112" y1="38" x2="112" y2="106" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="112" y1="38" x2="158" y2="106" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="158" y1="38" x2="158" y2="106" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- N serifs top -->
  <line x1="107" y1="38" x2="117" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="153" y1="38" x2="163" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- N serifs bottom -->
  <line x1="107" y1="106" x2="117" y2="106" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="153" y1="106" x2="163" y2="106" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- L bottom serif extension -->
  <line x1="73" y1="106" x2="83" y2="106" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>

  <!-- Horizontal divider with diamonds -->
  <line x1="20" y1="122" x2="105" y2="122" stroke="currentColor" stroke-width="0.7"/>
  <polygon points="120,118 125,122 120,126 115,122" fill="currentColor"/>
  <line x1="135" y1="122" x2="220" y2="122" stroke="currentColor" stroke-width="0.7"/>

  <!-- Lu Niero -->
  <text x="120" y="151"
    font-family="'Times New Roman', Georgia, 'Palatino Linotype', serif"
    font-size="26"
    text-anchor="middle"
    fill="currentColor"
    letter-spacing="5">Lu Niero</text>

  <!-- Thin rule below name -->
  <line x1="55" y1="160" x2="185" y2="160" stroke="currentColor" stroke-width="0.5"/>

  <!-- Réplicas de Jóias -->
  <text x="120" y="180"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="11"
    text-anchor="middle"
    fill="currentColor"
    letter-spacing="3">Réplicas de Jóias</text>
</svg>
